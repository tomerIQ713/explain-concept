<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explain Concept</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <link id="hljsTheme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <link id="hljsThemeLight" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" disabled />
  <style>
    :root {
      --bg: #0B0F14;
      --surface: #121826;
      --surface2: #1F2937;
      --text: #E5E7EB;
      --text-muted: #9CA3AF;
      --accent: #3B82F6;
      --border: #1F2937;
      --error: #ef5350;
      --success: #66bb6a;
    }
    :root.light {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface2: #F1F5F9;
      --text: #0F172A;
      --text-muted: #64748B;
      --accent: #3B82F6;
      --border: #E2E8F0;
      --error: #DC2626;
      --success: #16A34A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.5rem; }
    header .controls { display: flex; gap: 8px; }
    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: var(--surface2); }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-muted); }
    select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }
    select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .result-section h1,
    .result-section h2,
    .result-section h3,
    .result-section h4 {
      margin: 16px 0 8px 0;
      color: var(--accent);
      line-height: 1.3;
    }
    .result-section h1 { font-size: 1.3rem; }
    .result-section h2 { font-size: 1.15rem; }
    .result-section h3 { font-size: 1.05rem; }
    .result-section h4 { font-size: 1rem; }
    .result-section h1:first-child,
    .result-section h2:first-child,
    .result-section h3:first-child { margin-top: 0; }
    .result-section p {
      margin: 8px 0;
      line-height: 1.7;
    }
    .result-section ul, .result-section ol {
      margin: 8px 0;
      padding-left: 24px;
    }
    .result-section li {
      margin: 4px 0;
      line-height: 1.6;
    }
    .result-section code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .result-section pre {
      background: var(--surface2);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .result-section pre code { background: none; padding: 0; }
    .result-section blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 12px 0;
      background: var(--surface2);
      border-radius: 0 6px 6px 0;
    }
    .result-section hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .result-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    .result-section th, .result-section td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .result-section th {
      background: var(--surface2);
      font-weight: 600;
    }
    .result-section strong { font-weight: 600; }
    .result-section em { font-style: italic; }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .error-box {
      background: var(--error);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 12px 0;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
    }
    .modal h2 { margin-bottom: 16px; }
    .modal label { margin-top: 12px; }
    .modal .btn-primary { margin-top: 16px; width: 100%; }
    .free-model-item:hover { background: var(--surface2); }
    .free-model-item.selected { border-color: var(--accent); }
    .history-panel {
      position: fixed;
      top: 0; right: -320px;
      width: 320px; height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transition: right 0.3s;
      z-index: 90;
      padding: 20px;
      overflow-y: auto;
    }
    .history-panel.open { right: 0; }
    .history-panel h2 { margin-bottom: 16px; }
    .history-item {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item .query { font-weight: 600; }
    .history-item .meta { color: var(--text-muted); font-size: 0.8rem; }
    .history-panel .close-btn {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.2rem;
    }
    .model-badge {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .history-panel { width: 280px; right: -280px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 Explain Concept</h1>
      <div class="controls">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">🌙</button>
        <button class="icon-btn" id="historyToggle" title="History">📋</button>
        <button class="icon-btn" id="settingsToggle" title="Settings">⚙️</button>
      </div>
    </header>

    <div class="model-badge" id="modelBadge">Model: openrouter/free</div>

    <div class="form-group">
      <label for="levelSelect">Experience Level</label>
      <select id="levelSelect">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate" selected>Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>

    <div class="form-group">
      <label for="conceptInput">Paste code or describe a concept</label>
      <textarea id="conceptInput" placeholder="Paste a confusing function, unfamiliar syntax, or just describe what you don't understand..."></textarea>
    </div>

    <button class="btn-primary" id="explainBtn" disabled>Explain</button>

    <div id="resultArea" style="margin-top: 24px;"></div>
  </div>

  <div class="history-panel" id="historyPanel">
    <button class="close-btn" id="historyClose">✕</button>
    <h2>History</h2>
    <div id="historyList"></div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>Settings</h2>
      <label for="apiKey">OpenRouter API Key</label>
      <input type="password" id="apiKey" style="width:100%;padding:10px 12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;" placeholder="sk-or-..." />
      <label for="modelSelect">Model</label>
      <input type="text" id="modelSelect" value="openrouter/free" style="width:100%;padding:10px 12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;" placeholder="e.g. openrouter/free" />
      <button class="btn-primary" id="discoverModels" style="margin-top:8px;background:var(--surface2);font-size:0.85rem;">Search free models</button>
      <div id="modelList" style="margin-top:8px;max-height:200px;overflow-y:auto;display:none;"></div>
      <button class="btn-primary" id="saveSettings" style="margin-top:12px;">Save</button>
    </div>
  </div>

  <script>
const STORAGE_KEYS = {
  API_KEY: 'explain_api_key',
  MODEL: 'explain_model',
  THEME: 'explain_theme',
  HISTORY: 'explain_history',
};

function getSettings() {
  return {
    apiKey: localStorage.getItem(STORAGE_KEYS.API_KEY) || '',
    model: localStorage.getItem(STORAGE_KEYS.MODEL) || 'openrouter/free',
  };
}

function saveSettings(apiKey, model) {
  localStorage.setItem(STORAGE_KEYS.API_KEY, apiKey);
  localStorage.setItem(STORAGE_KEYS.MODEL, model);
}

function getTheme() {
  return localStorage.getItem(STORAGE_KEYS.THEME) || 'dark';
}

function setTheme(theme) {
  document.documentElement.className = theme === 'light' ? 'light' : '';
  localStorage.setItem(STORAGE_KEYS.THEME, theme);
  document.getElementById('themeToggle').textContent = theme === 'light' ? '☀️' : '🌙';
  const isLight = theme === 'light';
  document.getElementById('hljsTheme').disabled = isLight;
  document.getElementById('hljsThemeLight').disabled = !isLight;
}

const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  const current = getTheme();
  setTheme(current === 'light' ? 'dark' : 'light');
});

const settingsToggle = document.getElementById('settingsToggle');
const settingsModal = document.getElementById('settingsModal');
const saveSettingsBtn = document.getElementById('saveSettings');
const apiKeyInput = document.getElementById('apiKey');
const modelSelect = document.getElementById('modelSelect');
const discoverBtn = document.getElementById('discoverModels');
const modelListEl = document.getElementById('modelList');

settingsToggle.addEventListener('click', () => {
  const s = getSettings();
  apiKeyInput.value = s.apiKey;
  modelSelect.value = s.model;
  modelListEl.style.display = 'none';
  settingsModal.classList.add('open');
});

settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) settingsModal.classList.remove('open');
});

saveSettingsBtn.addEventListener('click', () => {
  saveSettings(apiKeyInput.value.trim(), modelSelect.value);
  renderModelBadge();
  settingsModal.classList.remove('open');
});

discoverBtn.addEventListener('click', async () => {
  if (!apiKeyInput.value.trim()) {
    modelListEl.style.display = 'block';
    modelListEl.innerHTML = '<div style="color:var(--error);font-size:0.85rem;">Enter your API key first.</div>';
    return;
  }
  saveSettings(apiKeyInput.value.trim(), modelSelect.value);
  discoverBtn.disabled = true;
  discoverBtn.textContent = 'Searching...';
  modelListEl.style.display = 'block';
  modelListEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Loading...</div>';
  try {
    const models = await fetchFreeModels();
    if (!models.length) {
      modelListEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No free models found.</div>';
      return;
    }
    modelListEl.innerHTML = models.map(m => `
      <div class="free-model-item" data-model="${escapeHtml(m.id)}" style="padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:0.85rem;display:flex;justify-content:space-between;align-items:center;">
        <span><strong>${escapeHtml(m.name)}</strong><br><span style="color:var(--text-muted);font-size:0.8rem;">${escapeHtml(m.id)}</span></span>
        <span style="color:var(--text-muted);font-size:0.75rem;">${escapeHtml(m.context)} ctx</span>
      </div>
    `).join('');
    modelListEl.querySelectorAll('.free-model-item').forEach(el => {
      el.addEventListener('click', async () => {
        const modelId = el.dataset.model;
        modelSelect.value = modelId;
        saveSettings(apiKeyInput.value.trim(), modelId);
        modelListEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Testing model... one sec.</div>';
        try {
          const res = await explainConcept('what is 2+2', 'Beginner');
          if (res && res.length > 10) {
            modelListEl.innerHTML = `<div style="color:var(--success);font-size:0.85rem;">Model works! Saved.</div>`;
            renderModelBadge();
          }
        } catch {
          modelListEl.innerHTML = `<div style="color:var(--error);font-size:0.85rem;">Model failed. Try another.</div>`;
          modelSelect.value = getSettings().model;
        }
      });
    });
  } catch (err) {
    modelListEl.innerHTML = `<div style="color:var(--error);font-size:0.85rem;">${escapeHtml(err.message)}</div>`;
  } finally {
    discoverBtn.disabled = false;
    discoverBtn.textContent = 'Search free models';
  }
});

function renderModelBadge() {
  const { model } = getSettings();
  const modelLabel = model;
  document.getElementById('modelBadge').textContent = `Model: ${modelLabel}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function explainConcept(concept, level, signal) {
  const { apiKey, model } = getSettings();
  if (!apiKey) throw new Error('No API key configured. Add one in Settings.');

  const systemPrompt = `You are a patient tutor who explains concepts from scratch. Given the following concept/code and the learner's experience level (${level}), produce a structured explanation with exactly these 5 sections:

1. **Plain English** — What it is in simple terms
2. **How It Works** — The mechanics under the hood
3. **Real-World Analogy** — A relatable metaphor
4. **Code Example** — A clean, minimal example (if applicable)
5. **Common Mistakes** — What beginners get wrong

Match the depth to the experience level. Be accurate but never condescending.`;

  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey.trim()}`,
      'Content-Type': 'application/json',
      'HTTP-Referer': 'https://explain-concept-local',
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: `Explain this (${level} level):\n\n${concept}` },
      ],
      temperature: 0.3,
    }),
    signal,
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err.error?.message || res.statusText;
    if (res.status === 429) throw new Error('Rate limited. Wait a moment and retry.');
    throw new Error(`API error (${res.status}): ${msg} — check your API key and model selection`);
  }

  const data = await res.json();
  return data.choices[0].message.content;
}

async function fetchFreeModels() {
  const { apiKey } = getSettings();
  if (!apiKey) throw new Error('Add your API key in Settings first.');

  const res = await fetch('https://openrouter.ai/api/v1/models', {
    headers: {
      'Authorization': `Bearer ${apiKey.trim()}`,
      'HTTP-Referer': 'https://explain-concept-local',
    },
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Failed to fetch models');
  }

  const data = await res.json();
  const freeModels = (data.data || []).filter(m =>
    m.id.endsWith(':free') || m.pricing?.prompt === 0
  );

  return freeModels.map(m => ({
    id: m.id,
    name: m.name || m.id,
    context: m.context_length || '?',
  }));
}

function renderResult(markdown, query, level) {
  const html = marked.parse(markdown, { breaks: true });
  resultArea.innerHTML = `
    <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:8px;">
      Level: ${level} · ${new Date().toLocaleTimeString()}
    </div>
    <div class="result-section">${html}</div>
  `;
  resultArea.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

const MAX_HISTORY = 20;

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY) || '[]');
  } catch { return []; }
}

function addToHistory(query, level, markdown) {
  const history = getHistory();
  history.unshift({ query, level, markdown, timestamp: Date.now() });
  if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
  localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const history = getHistory();
  if (!history.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">No explanations yet.</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => `
    <div class="history-item" data-index="${i}">
      <div class="query">${escapeHtml(truncate(item.query, 60))}</div>
      <div class="meta">${item.level} · ${new Date(item.timestamp).toLocaleDateString()}</div>
    </div>
  `).join('');

  list.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.index);
      const item = getHistory()[idx];
      if (item) {
        renderResult(item.markdown, item.query, item.level);
      }
    });
  });
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '...' : str;
}

const explainBtn = document.getElementById('explainBtn');
const conceptInput = document.getElementById('conceptInput');
const levelSelect = document.getElementById('levelSelect');
const resultArea = document.getElementById('resultArea');

conceptInput.addEventListener('input', () => {
  explainBtn.disabled = conceptInput.value.trim().length === 0;
});

conceptInput.addEventListener('input', () => {
  conceptInput.style.height = 'auto';
  conceptInput.style.height = conceptInput.scrollHeight + 'px';
});
conceptInput.style.height = conceptInput.scrollHeight + 'px';

let abortController;

explainBtn.addEventListener('click', async () => {
  const concept = conceptInput.value.trim();
  if (!concept) return;

  const level = levelSelect.value;
  explainBtn.disabled = true;
  explainBtn.textContent = 'Thinking...';
  resultArea.innerHTML = '<div class="loading">Explaining...</div>';

  abortController = new AbortController();
  const timeout = setTimeout(() => abortController.abort(), 45000);

  try {
    const markdown = await explainConcept(concept, level, abortController.signal);
    renderResult(markdown, concept, level);
    addToHistory(concept, level, markdown);
  } catch (err) {
    console.error('Explain error:', err);
    let msg;
    if (err.name === 'AbortError') {
      msg = 'Request timed out after 45s. The free model may be slow — try a different one or try again later.';
    } else if (err instanceof TypeError) {
      msg = `Request failed — check your internet connection and that the model ID is valid. (${err.message})`;
    } else {
      msg = err.message;
    }
    resultArea.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    if (err.message && err.message.includes('No API key')) {
      settingsModal.classList.add('open');
    }
  } finally {
    clearTimeout(timeout);
    explainBtn.disabled = false;
    explainBtn.textContent = 'Explain';
  }
});

const historyToggle = document.getElementById('historyToggle');
const historyPanel = document.getElementById('historyPanel');
const historyClose = document.getElementById('historyClose');

historyToggle.addEventListener('click', () => {
  renderHistory();
  historyPanel.classList.toggle('open');
});

historyClose.addEventListener('click', () => historyPanel.classList.remove('open'));

setTheme(getTheme());
renderHistory();
renderModelBadge();
  </script>
</body>
</html>
